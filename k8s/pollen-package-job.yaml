apiVersion: batch/v1
kind: Job
metadata:
  name: pollen-package-job
  namespace: stenc-ns
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      containers:
        - name: packager
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              python /app/k8s_package_delivery.py
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              memory: "16Gi" 
              cpu: "4"
            requests:
              memory: "8Gi"
              cpu: "2"
          env:
            - name: S3_ENDPOINT
              value: "https://s3.cl4.du.cesnet.cz"
            - name: S3_BUCKET
              value: "bucket"
            - name: S3_PREFIX
              value: "Ostatni/Pollen_latitude"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
      restartPolicy: Never
  backoffLimit: 1
