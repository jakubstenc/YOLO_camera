apiVersion: batch/v1
kind: Job
metadata:
  name: pollen-test-preview
  namespace: stenc-ns
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: s3-sync
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - |
              aws --endpoint-url "$S3_ENDPOINT" s3 sync \
                "s3://$S3_BUCKET/Ostatni/Pollen_latitude/Source/Tanzania1/AbuGui/" \
                /mnt/czi_data/Tanzania1/AbuGui/ \
                --exclude "*" --include "20250901_049_AbuGui1_Kocarkova.czi" \
                --no-verify-ssl
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          env:
            - name: S3_ENDPOINT
              value: "https://s3.cl4.du.cesnet.cz"
            - name: S3_BUCKET
              value: "bucket"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
          volumeMounts:
            - mountPath: /mnt/czi_data
              name: scratch
      containers:
        - name: czi-preprocessor
          image: ttl.sh/pollen-czi-8c8a6c09:24h
          imagePullPolicy: Always
          command:
            - python
            - czi_ingest.py
            - --root
            - /mnt/czi_data
            - --out
            - /tmp/test_preview
            - --channels
            - "0"
            - "1"
            - "2"
            - --z
            - mip
            - --overlap
            - "0.20"
            - --upload
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              memory: "24Gi" 
              cpu: "6"
            requests:
              memory: "16Gi"
              cpu: "2"
          env:
            - name: S3_ENDPOINT
              value: "https://s3.cl4.du.cesnet.cz"
            - name: S3_BUCKET
              value: "bucket"
            - name: S3_PREFIX
              value: "Ostatni/Pollen_latitude"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /mnt/czi_data
              name: scratch
            - mountPath: /tmp
              name: tmp
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "8Gi"
        - name: scratch
          emptyDir:
            sizeLimit: "20Gi" 
        - name: tmp
          emptyDir:
            sizeLimit: "50Gi"
      restartPolicy: Never
  backoffLimit: 1
