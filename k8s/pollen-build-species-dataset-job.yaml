apiVersion: batch/v1
kind: Job
metadata:
  name: pollen-build-species-dataset
  namespace: stenc-ns
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: download-data
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - |
              echo "Downloading general_pollen model..."
              aws --endpoint-url "$S3_ENDPOINT" s3 cp "s3://$S3_BUCKET/Ostatni/Pollen_latitude/trained_models/general_pollen/latest.pt" /mnt/model/best.pt --no-verify-ssl
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          env:
            - name: S3_ENDPOINT
              value: "https://s3.cl4.du.cesnet.cz"
            - name: S3_BUCKET
              value: "bucket"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
          volumeMounts:
            - mountPath: /mnt/czi_data
              name: scratch
            - mountPath: /mnt/model
              name: model-vol
      containers:
        - name: dataset-builder
          image: ttl.sh/pollen-latitude:24h
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              echo "Starting Species Dataset Builder..."
              mkdir -p /app/Trainig_data
              python3 /app/build_species_dataset.py \
                --root /mnt/czi_data \
                --out /app/Trainig_data \
                --model /mnt/model/best.pt \
                --conf 0.15 \
                --manifest /app/species_manifest_czech.csv \
                ${SPECIES_ARG} \
                ${COUNT_ARG}
                
              echo "Uploading generated Species Datasets and Stats to S3..."
              s5cmd --endpoint-url "$S3_ENDPOINT" --no-verify-ssl sync "/app/Trainig_data/*" "s3://$S3_BUCKET/Ostatni/Pollen_latitude/Species_model/Trainig_data/CzechComplet/"
              
              echo "Sending notification email..."
              python3 /app/notify.py --type training --job_name "Species Dataset Builder"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            requests:
              memory: "8Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
          env:
            - name: S3_ENDPOINT
              value: "https://s3.cl4.du.cesnet.cz"
            - name: S3_BUCKET
              value: "bucket"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
            - name: S3_PREFIX
              value: "Ostatni/Pollen_latitude/Source/CzechComplet/"
            - name: SPECIES_ARG
              value: ""
            - name: COUNT_ARG
              value: "--count 2"
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: email-credentials
                  key: GMAIL_APP_PASSWORD
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /mnt/czi_data
              name: scratch
            - mountPath: /mnt/model
              name: model-vol
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "32Gi"
        - name: scratch
          emptyDir:
            sizeLimit: "100Gi"
        - name: model-vol
          emptyDir:
            sizeLimit: "1Gi"
      restartPolicy: Never
  backoffLimit: 1
